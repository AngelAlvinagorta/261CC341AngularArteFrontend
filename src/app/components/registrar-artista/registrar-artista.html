<div class="container mt-4">
  <div class="row">
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-4">Registrar Artista</h5>
        <form class="form-group" [formGroup]="artistaForm">
          
          <div class="row mb-2">
            <label for="dni" class="col-sm-2 col-form-label">DNI:</label>
            <div class="col-sm-4">
              <input type="text" class="form-control" id="dni" placeholder="Ingrese DNI" formControlName="dni" />
            </div>
          </div>

          <div class="row mb-2">
            <label for="nombre" class="col-sm-2 col-form-label">Nombre Completo:</label>
            <div class="col-sm-6">
              <input type="text" class="form-control" id="nombre" placeholder="Ingrese nombres y apellidos" formControlName="nombre" />
            </div>
          </div>

          <div class="row mb-2">
            <label for="direccion" class="col-sm-2 col-form-label">Dirección:</label>
            <div class="col-sm-6">
              <input type="text" class="form-control" id="direccion" placeholder="Ingrese dirección" formControlName="direccion" />
            </div>
          </div>

          <div class="row mb-2">
            <label for="correo" class="col-sm-2 col-form-label">Correo Electrónico:</label>
            <div class="col-sm-6">
              <input type="email" class="form-control" id="correo" placeholder="ejemplo@correo.com" formControlName="correo" />
            </div>
          </div>

          <div class="row mb-2">
            <label for="sexo" class="col-sm-2 col-form-label">Sexo:</label>
            <div class="col-sm-3">
              <select class="form-control form-select" aria-label="Elija el Sexo" id="sexo" formControlName="sexo">
                @for(s of listaSexos; track s.id){
                  <option [value]="s.id">{{s.descripcion}}</option>
                }
              </select>
            </div>
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2" (click)="registrarArtista()" [disabled]="artistaForm.invalid">
              {{isEdited ? 'Actualizar' : 'Registrar'}}
            </button>
            <button type="button" class="btn btn-secondary" (click)="refreshForm()">Cancelar</button>
          </div>

        </form>
      </div>
    </div> <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">Lista de Artistas Registrados</h5>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th scope="col">#</th>
                <th scope="col">DNI</th>
                <th scope="col">Nombre</th>
                <th scope="col">Dirección</th>
                <th scope="col">Correo</th>
                <th scope="col">Sexo</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let artista of artistas; let i = index">
                <td>{{ i + 1 }}</td>
                <td>{{ artista.dni }}</td>
                <td>{{ artista.nombre }}</td>
                <td>{{ artista.direccion }}</td>
                <td>{{ artista.correo }}</td>
                <td>
                  <span *ngIf="artista.sexo === 'M'">Masculino</span>
                  <span *ngIf="artista.sexo === 'F'">Femenino</span>
                  <span *ngIf="artista.sexo === 'OTRO'">Otro</span>
                </td>
              </tr>
              <tr *ngIf="artistas.length === 0">
                <td colspan="6" class="text-center text-muted">No hay artistas registrados aún.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div> 
  </div>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
    
        <div class="text-center mb-4">
            <h3 class="fw-bold">Bienvenido</h3>
            <p class="text-muted">Sistema de Galería de Arte</p>
        </div>

        <div class="alert alert-danger" *ngIf="mensajeError">
            {{ mensajeError }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()">
      
            <div class="mb-3">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control form-control-lg" id="correo" placeholder="admin@galeria.com" formControlName="correo">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control form-control-lg" id="password" placeholder="******" formControlName="password">
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100" [disabled]="loginForm.invalid">
            Ingresar al Sistema
            </button>
            <div class="mt-4 text-center">
                <p class="mb-0 text-muted">¿No tienes una cuenta?</p>
                <a routerLink="/registrar-artista" class="text-primary text-decoration-none fw-bold" style="cursor: pointer;">
                Regístrate aquí
                </a>
            </div>
        </form>
    </div>
</div>
